<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - CASA EL MOLINO</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="sidebar-logo">CASA EL MOLINO<br><span style="font-size: 0.8rem; font-weight: 400;">Recepción Central</span></div>
            <button class="nav-btn active" onclick="switchTab('requests')"><i class="fa-solid fa-bell"></i> Servicios</button>
            <button class="nav-btn" onclick="switchTab('suggestions')"><i class="fa-solid fa-envelope-open-text"></i> Sugerencias</button>
        </aside>

        <main class="main-content">
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Servicios Pendientes</h3>
                        <p id="pending-count">0</p>
                    </div>
                    <i class="fa-solid fa-clock"></i>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Nuevas Sugerencias</h3>
                        <p id="sugg-count">0</p>
                    </div>
                    <i class="fa-solid fa-comment-dots"></i>
                </div>
            </div>

            <div id="requests-tab" class="table-container active">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Hab.</th>
                            <th>Servicio</th>
                            <th>Detalles</th>
                            <th>Hora</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="requests-body">
                        <tr><td colspan="6" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="suggestions-tab" class="table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Hab.</th>
                            <th>Mensaje / Oportunidad de Mejora</th>
                            <th>Fecha y Hora</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="suggestions-body">
                        <tr><td colspan="4" style="text-align:center;">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { db } from './firebase-config.js';
        import { collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const audio = document.getElementById('notification-sound');
        let initialLoadReq = true;
        let initialLoadSugg = true;

        // Pestañas (Navegación UI)
        window.switchTab = (tabName) => {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.table-container').forEach(tc => tc.classList.remove('active'));
            
            if(tabName === 'requests') {
                document.querySelectorAll('.nav-btn')[0].classList.add('active');
                document.getElementById('requests-tab').classList.add('active');
            } else {
                document.querySelectorAll('.nav-btn')[1].classList.add('active');
                document.getElementById('suggestions-tab').classList.add('active');
            }
        };

        // --- SISTEMA DE SERVICIOS ---
        const qReq = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(qReq, (snapshot) => {
            const tbody = document.getElementById('requests-body');
            tbody.innerHTML = '';
            let pendingCount = 0;

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 2rem;">No hay servicios en cola.</td></tr>';
            }

            snapshot.docChanges().forEach((change) => {
                if (change.type === "added" && !initialLoadReq) {
                    audio.play().catch(() => {});
                }
            });

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const timeStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Ahora';

                if (data.status === 'pending') pendingCount++;

                let statusBadge = '';
                if (data.status === 'pending') statusBadge = '<span class="status-badge status-pending">Pendiente</span>';
                if (data.status === 'progress') statusBadge = '<span class="status-badge status-progress">Atendiendo</span>';
                if (data.status === 'completed') statusBadge = '<span class="status-badge status-completed">Finalizado</span>';

                let actionBtns = '';
                if (data.status === 'pending') actionBtns += `<button class="action-btn btn-progress" onclick="updateStatus('${id}', 'progress')" title="Marcar en progreso"><i class="fa-solid fa-play"></i></button>`;
                else if (data.status === 'progress') actionBtns += `<button class="action-btn btn-complete" onclick="updateStatus('${id}', 'completed')" title="Marcar como finalizado"><i class="fa-solid fa-check"></i></button>`;
                
                actionBtns += `<button class="action-btn btn-delete" onclick="deleteDocItem('requests', '${id}')" title="Eliminar"><i class="fa-solid fa-trash"></i></button>`;

                const tr = document.createElement('tr');
                tr.innerHTML = `<td><strong>${data.room}</strong></td><td><strong>${data.serviceName}</strong></td><td>${data.comment || '<span style="color:#aaa;">-</span>'}</td><td>${timeStr}</td><td>${statusBadge}</td><td>${actionBtns}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('pending-count').textContent = pendingCount;
            initialLoadReq = false;
        });

        // --- SISTEMA DE SUGERENCIAS ---
        const qSugg = query(collection(db, "suggestions"), orderBy("timestamp", "desc"));
        onSnapshot(qSugg, (snapshot) => {
            const tbody = document.getElementById('suggestions-body');
            tbody.innerHTML = '';
            
            document.getElementById('sugg-count').textContent = snapshot.size;

            if (snapshot.empty) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 2rem;">El buzón está vacío.</td></tr>';
                return;
            }

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                const dateStr = data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString([], {day:'2-digit', month:'short', hour: '2-digit', minute:'2-digit'}) : 'Reciente';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${data.room}</strong></td>
                    <td style="max-width: 300px; line-height: 1.4;">"${data.text}"</td>
                    <td>${dateStr}</td>
                    <td><button class="action-btn btn-delete" onclick="deleteDocItem('suggestions', '${id}')" title="Eliminar para liberar espacio"><i class="fa-solid fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
            initialLoadSugg = false;
        });

        // --- FUNCIONES GLOBALES ---
        window.updateStatus = async (id, newStatus) => {
            await updateDoc(doc(db, "requests", id), { status: newStatus });
        };

        window.deleteDocItem = async (collectionName, id) => {
            if(confirm(`¿Desea eliminar este registro del sistema? Esta acción liberará espacio de la base de datos.`)) {
                await deleteDoc(doc(db, collectionName, id));
            }
        };
    </script>
</body>
</html>
